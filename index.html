<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SF Neighborhood Picker</title>
  <link rel="stylesheet" href="leaflet.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div id="app">

    <!-- Top header bar -->
    <header id="app-header">
      <h1>SF Neighborhood<span class="accent"> Picker</span></h1>
      <span id="header-stats"></span>
    </header>

    <!-- Error banner (hidden by default) -->
    <div id="error-banner" class="hidden">
      <span id="error-message"></span>
      <button id="error-close" aria-label="Dismiss error">&#x2715;</button>
    </div>

    <!-- Loading overlay (hidden by default via CSS) -->
    <div id="loading-overlay">
      <div class="spinner"></div>
      <span>Loading San Francisco neighborhoods&hellip;</span>
    </div>

    <!-- Two-panel main area -->
    <div id="main">

      <!-- Left: Leaflet map -->
      <div id="map-container"></div>

      <!-- Right: side panel -->
      <aside id="side-panel" aria-label="Neighborhood list">

        <!-- Sticky search bar -->
        <div id="search-bar">
          <input
            type="text"
            id="search"
            placeholder="Search neighborhoods&hellip;"
            autocomplete="off"
            spellcheck="false"
          />
        </div>

        <!-- Stats row -->
        <div id="stats-bar">
          <span id="active-count"></span>
          <span id="eliminated-count"></span>
        </div>

        <!-- Neighborhood list — populated by app.js -->
        <div id="neighborhood-list" role="list"></div>

      </aside>
    </div>
  </div>

  <script src="leaflet.js"></script>
  <!-- Neighborhood GeoJSON embedded as a local JS file — no fetch/CORS needed -->
  <script src="sf_neighborhoods_data.js"></script>
  <script src="app.js"></script>
</body>
</html>
